<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="pdf-frame"></iframe>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get('pdf');
    document.getElementById('pdf-frame').src = `https://docs.google.com/gview?url=${pdfUrl}&embedded=true`;
  </script>
</body>
</html>
