<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="pdf-frame"></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const pdf = urlParams.get('pdf');
    document.getElementById("pdf-frame").src = `https://docs.google.com/gview?url=${pdf}&embedded=true`;
  </script>
</body>
</html>
