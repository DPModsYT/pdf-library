<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Custom PDF Viewer</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #pdf-render {
      width: 100%;
      height: calc(100vh - 80px);
      background: #f0f0f0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    .controls {
      text-align: center;
      padding: 10px;
    }
    .controls button {
      margin: 5px;
      padding: 8px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="controls">
    <button id="prev-page">Previous</button>
    <button id="next-page">Next</button>
    <button id="zoom-in">Zoom In</button>
    <button id="zoom-out">Zoom Out</button>
  </div>

  <div id="pdf-render"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const pdfUrl = urlParams.get('pdf');
    let pdfDoc = null;
    let currentPage = 1;
    let zoomLevel = 1.5; // Initial zoom level

    if (!pdfUrl) {
      document.getElementById('pdf-render').innerText = 'No PDF provided';
    } else {
      const container = document.getElementById('pdf-render');
      const loadingTask = pdfjsLib.getDocument(pdfUrl);

      loadingTask.promise.then(pdf => {
        pdfDoc = pdf;
        renderPage(currentPage);
      }, err => {
        container.innerText = `Error loading PDF: ${err.message}`;
      });

      // Render the current page
      function renderPage(pageNum) {
        pdfDoc.getPage(pageNum).then(page => {
          const viewport = page.getViewport({ scale: zoomLevel });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          container.innerHTML = ''; // Clear existing canvas
          container.appendChild(canvas);

          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };
          page.render(renderContext);
        });
      }

      // Navigation and zoom controls
      document.getElementById('prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          renderPage(currentPage);
        }
      });

      document.getElementById('next-page').addEventListener('click', () => {
        if (currentPage < pdfDoc.numPages) {
          currentPage++;
          renderPage(currentPage);
        }
      });

      document.getElementById('zoom-in').addEventListener('click', () => {
        zoomLevel += 0.25; // Zoom in by 0.25
        renderPage(currentPage);
      });

      document.getElementById('zoom-out').addEventListener('click', () => {
        if (zoomLevel > 0.5) { // Prevent zooming out too far
          zoomLevel -= 0.25; // Zoom out by 0.25
          renderPage(currentPage);
        }
      });
    }
  </script>

</body>
</html>
