
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="pdf-viewer"></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const pdfUrl = params.get("pdf");
    if (pdfUrl) {
      const viewerUrl = `pdfjs/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
      document.getElementById("pdf-viewer").src = viewerUrl;
    } else {
      document.body.innerHTML = "<h2>No PDF URL provided</h2>";
    }
  </script>
</body>
</html>
