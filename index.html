<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📚 PDF Book Library</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f9f9f9;
      text-align: center;
    }
    h1 {
      margin: 20px 0;
    }
    #book-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }
    .book-card {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      width: 200px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: left;
    }
    .book-card img {
      width: 100%;
      border-radius: 8px;
    }
    .book-card h3 {
      font-size: 18px;
      margin: 10px 0 5px;
    }
    .book-card p {
      margin: 4px 0;
    }
    .read-more {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>📚 PDF Book Library</h1>
  <div id="book-grid"></div>

  <!-- Include books.js -->
  <script src="js/books.js"></script>
</body>
</html>
